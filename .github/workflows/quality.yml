name: Quality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.txt
      - name: Install deterministic test dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-ci.txt
      - name: Compile Python sources
        run: python -m compileall -q core scripts st.py
      - name: Scan tracked files for secrets
        run: python scripts/check_tracked_secrets.py
      - name: Run unit tests
        run: python -m unittest discover -v tests
